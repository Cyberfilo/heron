name: verify-submission

# Runs on every PR that touches a submission (or the harness/questions it depends on).
# For each changed submissions/*.json we RE-RUN its SQL against a freshly-seeded gold DB and
# recompute the metrics — the contributor's claimed numbers are never trusted. The check FAILS
# if a submission is incomplete, uses the wrong model, contains non-SELECT SQL, or claims an
# accuracy its own SQL can't reproduce. Verified numbers are written to the job summary, so this
# works on fork PRs with no special permissions (read-only token, no PR-comment needed).

on:
  pull_request:
    paths:
      - 'submissions/**'
      - 'harness/**'
      - 'questions/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: heron
          POSTGRES_PASSWORD: heron
          POSTGRES_DB: heron
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U heron"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DSN: postgresql://heron:heron@localhost:5432/heron
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need base ref to diff changed submissions

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
          python -m pip install --upgrade pip
          pip install "psycopg[binary]" sqlglot openai
          pip install -r seed/requirements.txt

      - name: Load schema + seed the gold database (small)
        run: |
          make schema DSN="$DSN"
          make seed SCALE=small SEED=42 DSN="$DSN"
          make audit DSN="$DSN"                  # gold must still be trustworthy

      - name: Verify changed submissions (re-run their SQL)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base"...HEAD -- 'submissions/*.json' \
                    | grep -v 'submissions/leaderboard.json' || true)
          if [ -z "$changed" ]; then
            echo "No submission files changed — nothing to verify." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## heron submission verification" >> "$GITHUB_STEP_SUMMARY"
          echo "Re-ran each tool's SQL against a fresh gold DB. These are the numbers that will be published." >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for f in $changed; do
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### \`$f\`" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if python harness/score_submission.py "$f" --dsn "$DSN" >> "$GITHUB_STEP_SUMMARY" 2>&1; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "✅ verified" >> "$GITHUB_STEP_SUMMARY"
            else
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "❌ rejected — see reasons above" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
          done
          exit $fail
